name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install --legacy-peer-deps --no-audit --no-fund --loglevel verbose

      - name: Build (Next.js + OpenNext Cloudflare)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          npm run build:cf
          # Consolidate standard OpenNext output into a Cloudflare Pages compatible structure
          rm -rf dist-cf && mkdir -p dist-cf
          # 1. Copy static assets to root
          cp -r .open-next/assets/* dist-cf/
          # 2. Copy worker.js as _worker.js to root
          cp .open-next/worker.js dist-cf/_worker.js
          # 3. Copy _routes.json (REQUIRED for asset routing in Pages with a worker)
          [ -f ".open-next/_routes.json" ] && cp .open-next/_routes.json dist-cf/_routes.json
          # 4. Copy ALL internal OpenNext engine directories required by _worker.js
          for dir in cloudflare middleware .build server-functions; do
            if [ -d ".open-next/$dir" ]; then
              cp -r ".open-next/$dir" dist-cf/
            fi
          done

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler pages deploy dist-cf --project-name=engawa-project --commit-dirty=true
